<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRO Command Center</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal: #0D7A8A;
  --teal-light: #e1f5f7;
  --orange: #FFA73C;
  --navy: #081235;
  --bg: #ffffff;
  --bg2: #f5f5f3;
  --bg3: #ebebea;
  --text: #1a1a18;
  --text2: #6b6b68;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.18);
  --radius: 10px;
  --radius-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2c;
    --text: #f0efe8;
    --text2: #9a9a96;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.18);
    --teal-light: #0a3a40;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; flex-wrap: wrap; gap: 10px; }
.logo { font-size: 20px; font-weight: 600; color: var(--text); }
.logo span { color: var(--teal); }
.date-display { font-size: 13px; color: var(--text2); }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 600; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: 0.04em; }
.stat-overdue { color: #d94040; }
.quick-add { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.quick-add input { flex: 1; min-width: 200px; padding: 9px 13px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; background: var(--bg2); color: var(--text); outline: none; font-family: inherit; }
.quick-add input:focus { border-color: var(--teal); }
.quick-add select { padding: 9px 10px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg2); color: var(--text); outline: none; cursor: pointer; max-width: 200px; font-family: inherit; }
.add-btn { padding: 9px 18px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; }
.add-btn:hover { background: #0a6575; }
.tabs { display: flex; gap: 5px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border2); color: var(--text2); background: transparent; transition: all 0.13s; white-space: nowrap; font-family: inherit; }
.tab:hover { background: var(--bg2); color: var(--text); }
.tab.active { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 500; }
.two-col { display: grid; grid-template-columns: 1fr 340px; gap: 1.25rem; }
@media (max-width: 820px) { .two-col { grid-template-columns: 1fr; } }
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
.card + .card { margin-top: 1rem; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.875rem; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
.show-done-btn { font-size: 12px; color: var(--teal); cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
.todo-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.13s; background: transparent; }
.todo-check.done { background: var(--teal); border-color: var(--teal); }
.todo-check.done::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 700; }
.todo-body { flex: 1; min-width: 0; }
.todo-text { font-size: 14px; color: var(--text); line-height: 1.4; }
.todo-text.done-text { text-decoration: line-through; color: var(--text2); }
.todo-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 5px; }
.role-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
.age-badge { font-size: 11px; color: var(--text2); }
.age-badge.overdue { color: #d94040; font-weight: 600; }
.todo-del { font-size: 18px; color: var(--text2); cursor: pointer; padding: 0 4px; opacity: 0.4; flex-shrink: 0; line-height: 1; background: none; border: none; font-family: inherit; }
.todo-del:hover { opacity: 1; color: #d94040; }
.empty-state { text-align: center; padding: 2.5rem 0; color: var(--text2); font-size: 14px; }
.reminder-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 8px; }
.reminder-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.reminder-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.reminder-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.dismiss-btn { font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; padding: 0 0 0 4px; flex-shrink: 0; margin-top: 2px; font-family: inherit; }
.dismiss-btn:hover { color: var(--teal); }
.no-reminders { font-size: 13px; color: var(--text2); padding: 4px 0; }
textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg2); color: var(--text); resize: vertical; font-family: inherit; outline: none; line-height: 1.5; }
textarea:focus { border-color: var(--teal); }
.save-btn { margin-top: 8px; padding: 7px 16px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.save-btn:hover { background: #0a6575; }
.save-btn.secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); }
.save-btn.secondary:hover { background: var(--bg3); }
.saved-note { margin-top: 8px; font-size: 12px; color: var(--text2); }
.char-counter { font-size: 11px; color: var(--text2); text-align: right; margin-top: 3px; }
.char-counter.warn { color: #BA7517; }
.char-counter.over { color: #d94040; font-weight: 600; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">CRO <span>Command Center</span></div>
    <div class="date-display" id="date-display"></div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-open">0</div><div class="stat-label">Öppna</div></div>
    <div class="stat-box"><div class="stat-num stat-overdue" id="stat-overdue">0</div><div class="stat-label">Försenade</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Klara idag</div></div>
  </div>

  <div class="quick-add">
    <input type="text" id="todo-input" placeholder="Ny uppgift... (Enter för att lägga till)" maxlength="300" oninput="updateCounter()" />
    <select id="role-select"></select>
    <button class="add-btn" onclick="addTodo()">+ Lägg till</button>
  </div>
  <div class="char-counter" id="char-counter" style="margin-top:-6px;margin-bottom:10px;text-align:right">300 tecken kvar</div>

  <div class="tabs" id="tabs"></div>

  <div class="two-col">
    <div>
      <div class="card">
        <div class="section-header">
          <div class="card-title" id="list-title">Alla uppgifter</div>
          <button class="show-done-btn" onclick="toggleDone()" id="done-toggle">Visa klara</button>
        </div>
        <div id="todo-list"></div>
      </div>

      <div class="card">
        <div class="card-title">Daglig planering</div>
        <textarea id="plan-text" rows="5" placeholder="Vad ska du fokusera på imorgon? Prioriteringar, beroenden, viktiga deadlines..."></textarea>
        <button class="save-btn" onclick="savePlan()">Spara planering</button>
        <div class="saved-note" id="plan-note"></div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-title">Påminnelser</div>
        <div id="reminders-list"></div>
      </div>

      <div class="card">
        <div class="card-title">Kalender-snapshot</div>
        <div id="cal-drop-zone" style="border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:20px 12px;text-align:center;cursor:pointer;transition:border-color 0.15s;margin-bottom:8px;position:relative;">
          <div style="font-size:13px;color:var(--text2);line-height:1.6">Klistra in skärmbild (Ctrl+V)<br>eller klicka för att ladda upp</div>
          <input type="file" id="cal-file-input" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;" onchange="handleCalFile(event)" />
        </div>
        <div id="cal-preview" style="display:none;margin-bottom:8px;">
          <img id="cal-img" style="width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);" />
        </div>
        <button class="save-btn" id="cal-analyze-btn" onclick="analyzeCalendar()" style="width:100%;display:none;">Tolka med AI</button>
        <div id="cal-loading" style="display:none;font-size:13px;color:var(--teal);text-align:center;padding:10px 0;">Analyserar kalender...</div>
        <div id="cal-result" style="display:none;margin-top:10px;"></div>
        <div class="saved-note" id="cal-note"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ROLES = [
  { id: 'tet',            label: 'TET Ledningsgrupp',      color: '#185FA5', bg: '#ddeeff' },
  { id: 'arctic-lg',      label: 'Arctic Ledningsgrupp',   color: '#0F6E56', bg: '#d6f0e8' },
  { id: 'northstar',      label: 'Northstar Sales/GTM',    color: '#854F0B', bg: '#fde8c8' },
  { id: 'arctic-sales',   label: 'Arctic Säljteam',        color: '#533AB7', bg: '#e8e4fa' },
  { id: 'idnorth-sales',  label: 'ID North Säljteam',      color: '#993556', bg: '#fae0ea' },
  { id: 'event',          label: 'Event & Mässor',         color: '#3B6D11', bg: '#dff0cc' },
  { id: 'bid',            label: 'Bid-teamet',             color: '#993C1D', bg: '#fae0d6' },
  { id: 'commercial',     label: 'Commercial Council',     color: '#3C3489', bg: '#e4e2f8' },
  { id: 'partner-advisory', label: 'Partner Advisory',    color: '#0C447C', bg: '#d6eaf8' },
  { id: 'customer',       label: 'Kundmöten & Operativt', color: '#5F5E5A', bg: '#ebebea' },
  { id: 'partnership',    label: 'Partnerskap',            color: '#0F6E56', bg: '#d6f0e8' },
  { id: 'sync',           label: 'Funktionssynkar',        color: '#444441', bg: '#e0e0de' },
];

let todos = [];
let showDone = false;
let activeTab = 'all';
let nextId = 1;

function persist() {
  localStorage.setItem('acc2_todos', JSON.stringify(todos));
  localStorage.setItem('acc2_nextId', String(nextId));
}

function hydrate() {
  try {
    const t = localStorage.getItem('acc2_todos');
    const n = localStorage.getItem('acc2_nextId');
    if (t) todos = JSON.parse(t);
    if (n) nextId = parseInt(n) || 1;
    const plan = localStorage.getItem('acc2_plan');
    if (plan) document.getElementById('plan-text').value = plan;
    const calResult = localStorage.getItem('acc2_cal_result');
    if (calResult) {
      const el = document.getElementById('cal-result');
      el.style.display = 'block';
      el.innerHTML = '<div style="font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;border-top:1px solid var(--border);padding-top:10px;">' + escHtml(calResult) + '</div>';
    }
  } catch(e) {}
}

function getRole(id) { return ROLES.find(r => r.id === id) || ROLES[9]; }

function ageLabel(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 60) return mins + ' min';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.floor(hrs / 24) + 'd';
}

function isOverdue(t) {
  return !t.done && (Date.now() - t.created) > 24 * 60 * 60 * 1000;
}

function isAging(t) {
  return !t.done && (Date.now() - t.created) > 4 * 60 * 60 * 1000 && !isOverdue(t);
}

function buildRoleSelect() {
  const sel = document.getElementById('role-select');
  ROLES.forEach(r => {
    const o = document.createElement('option');
    o.value = r.id; o.textContent = r.label;
    sel.appendChild(o);
  });
}

function buildTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  const btn = (id, label) => {
    const b = document.createElement('button');
    b.className = 'tab' + (activeTab === id ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { activeTab = id; render(); };
    el.appendChild(b);
  };
  btn('all', 'Alla');
  ROLES.forEach(r => {
    if (todos.some(t => t.role === r.id && !t.done)) btn(r.id, r.label);
  });
}

function render() {
  buildTabs();
  renderList();
  renderStats();
  renderReminders();
}

function renderList() {
  const el = document.getElementById('todo-list');
  document.getElementById('list-title').textContent = activeTab === 'all' ? 'Alla uppgifter' : getRole(activeTab).label;
  document.getElementById('done-toggle').textContent = showDone ? 'Dölj klara' : 'Visa klara';

  let items = todos.filter(t => {
    if (activeTab !== 'all' && t.role !== activeTab) return false;
    if (!showDone && t.done) return false;
    return true;
  });
  items.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (isOverdue(b) !== isOverdue(a)) return isOverdue(b) ? 1 : -1;
    return b.created - a.created;
  });

  if (!items.length) {
    el.innerHTML = '<div class="empty-state">Inga uppgifter att visa.</div>';
    return;
  }

  el.innerHTML = '';
  items.forEach(todo => {
    const role = getRole(todo.role);
    const over = isOverdue(todo);
    const div = document.createElement('div');
    div.className = 'todo-item';
    div.innerHTML = `
      <div class="todo-check ${todo.done ? 'done' : ''}" onclick="toggleTodo(${todo.id})" title="${todo.done ? 'Markera öppen' : 'Markera klar'}"></div>
      <div class="todo-body">
        <div class="todo-text ${todo.done ? 'done-text' : ''}">${escHtml(todo.text)}</div>
        <div class="todo-meta">
          <span class="role-badge" style="background:${role.bg};color:${role.color}">${role.label}</span>
          <span class="age-badge ${over ? 'overdue' : ''}">${over ? '⚠ försenad · ' : ''}${ageLabel(todo.created)} sedan</span>
        </div>
      </div>
      <button class="todo-del" onclick="deleteTodo(${todo.id})" title="Ta bort">×</button>`;
    el.appendChild(div);
  });
}

function renderStats() {
  document.getElementById('stat-open').textContent = todos.filter(t => !t.done).length;
  document.getElementById('stat-overdue').textContent = todos.filter(t => isOverdue(t)).length;
  document.getElementById('stat-done').textContent = todos.filter(t => t.done).length;
}

function renderReminders() {
  const el = document.getElementById('reminders-list');
  const overdue = todos.filter(isOverdue);
  const aging = todos.filter(isAging);

  if (!overdue.length && !aging.length) {
    el.innerHTML = '<div class="no-reminders">Inga aktiva påminnelser.</div>';
    return;
  }

  el.innerHTML = '';
  const make = (t, color, bg, sub) => {
    const div = document.createElement('div');
    div.className = 'reminder-item';
    div.style.background = bg;
    div.innerHTML = `
      <div class="reminder-dot" style="background:${color}"></div>
      <div style="flex:1;min-width:0">
        <div class="reminder-text">${escHtml(t.text)}</div>
        <div class="reminder-sub">${sub}</div>
      </div>
      <button class="dismiss-btn" onclick="toggleTodo(${t.id})" title="Markera klar">✓</button>`;
    el.appendChild(div);
  };

  overdue.slice(0, 5).forEach(t => make(t, '#d94040', '#fce8e8', 'Öppen mer än 24h — stäng eller flytta framåt'));
  aging.slice(0, 4).forEach(t => make(t, '#BA7517', '#fde8c8', 'Öppen mer än 4h — fortfarande aktuell?'));
}

function updateCounter() {
  const inp = document.getElementById('todo-input');
  const el = document.getElementById('char-counter');
  const left = 300 - inp.value.length;
  el.textContent = left + ' tecken kvar';
  el.className = 'char-counter' + (left < 50 ? ' warn' : '') + (left < 10 ? ' over' : '');
}

function addTodo() {
  const inp = document.getElementById('todo-input');
  const sel = document.getElementById('role-select');
  const text = inp.value.trim();
  if (!text) return;
  todos.push({ id: nextId++, text, role: sel.value, created: Date.now(), done: false });
  inp.value = '';
  updateCounter();
  persist();
  render();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; t.doneAt = t.done ? Date.now() : null; }
  persist();
  render();
}

function deleteTodo(id) {
  if (!confirm('Ta bort uppgiften?')) return;
  todos = todos.filter(t => t.id !== id);
  persist();
  render();
}

function toggleDone() {
  showDone = !showDone;
  render();
}

function savePlan() {
  localStorage.setItem('acc2_plan', document.getElementById('plan-text').value);
  const n = document.getElementById('plan-note');
  n.textContent = 'Sparad ' + new Date().toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'});
  n.classList.add('pulse');
  setTimeout(() => n.classList.remove('pulse'), 600);
}

let calImageBase64 = null;
let calImageType = null;

function handleCalFile(event) {
  const file = event.target.files[0];
  if (file) loadCalImage(file);
}

function loadCalImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    calImageType = file.type || 'image/png';
    calImageBase64 = dataUrl.split(',')[1];
    document.getElementById('cal-img').src = dataUrl;
    document.getElementById('cal-preview').style.display = 'block';
    document.getElementById('cal-analyze-btn').style.display = 'block';
    document.getElementById('cal-result').style.display = 'none';
    document.getElementById('cal-note').textContent = '';
  };
  reader.readAsDataURL(file);
}

document.addEventListener('paste', (e) => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { loadCalImage(file); break; }
    }
  }
});

async function analyzeCalendar() {
  if (!calImageBase64) return;
  document.getElementById('cal-loading').style.display = 'block';
  document.getElementById('cal-analyze-btn').style.display = 'none';
  document.getElementById('cal-result').style.display = 'none';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: calImageType, data: calImageBase64 } },
            { type: 'text', text: 'Detta är en skärmbild av min Outlook-kalender. Extrahera alla möten och händelser. Lista dem med tid och titel i kronologisk ordning. Identifiera sedan de 3 viktigaste prioriteringarna baserat på mötestyp och titel. Svara på svenska. Håll det kortfattat och strukturerat.' }
          ]
        }]
      })
    });
    const data = await resp.json();
    const text = data.content && data.content[0] && data.content[0].text;
    if (text) {
      const el = document.getElementById('cal-result');
      el.style.display = 'block';
      el.innerHTML = '<div style="font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;border-top:1px solid var(--border);padding-top:10px;">' + escHtml(text) + '</div>';
      try { localStorage.setItem('acc2_cal_result', text); } catch(e) {}
      document.getElementById('cal-note').textContent = 'Analyserad ' + new Date().toLocaleTimeString('sv-SE', {hour:'2-digit',minute:'2-digit'});
    }
  } catch(err) {
    document.getElementById('cal-result').style.display = 'block';
    document.getElementById('cal-result').innerHTML = '<div style="font-size:13px;color:#d94040;">Kunde inte analysera bilden. Kontrollera din anslutning.</div>';
  }
  document.getElementById('cal-loading').style.display = 'none';
  document.getElementById('cal-analyze-btn').style.display = 'block';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initDate() {
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('sv-SE', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

buildRoleSelect();
hydrate();
initDate();
render();
setInterval(render, 5 * 60 * 1000);
</script>
</body>
</html>
